<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/animation.css">
</head>
<body>

    <header>
        <h1 class="Main-heading">ZooDoption</h1>
        <div class="Nav-bar">
            <ul>
                <li class="Nav-item"><a href="">Home</a></li>
                <li class="Nav-item"><a href="">Adoption</a></li>
                <li class="Nav-item"><a href="">Shop</a></li>
                <li class="Nav-item"><a href="">About Us</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="Cards">
          <div class="container">
              <div class="Card-1">
                <h3>Stray Cat</h3>
                <p>Orange and white Cat</p>
                <button class="Card-btn">Adopt</button>
            </div>

            <div class="Card-2">
                <h3>Peter Bald</h3>
                <p>No hair cat</p>
                <button class="Card-btn">Adopt</button>
            </div>

            <div class="Card-3">
                <h3>American Cat</h3>
                <p>Grey and white Cat</p>
                <button class="Card-btn">Adopt</button>
            </div>

            <div class="Card-4">
                <h3>Bombay</h3>
                <p>All black cat</p>
                <button class="Card-btn">Adopt</button>
            </div>
          </div>
        </section>

        <section class="Image-section">
            <img class="image" src="images/cat.jpg" alt="Cat smiling">
        </section>
    </main>
    
</body>
</html>
